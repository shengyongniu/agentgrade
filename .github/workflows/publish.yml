# Publish agentgrade to PyPI using PyPI Trusted Publishing (OIDC) — no API tokens.
#
# ONE-TIME SETUP THE MAINTAINER MUST DO ON PyPI (no secrets go in this repo):
#   1. Create/own the `agentgrade` project on https://pypi.org.
#   2. Go to the project's "Publishing" settings (pypi.org -> your project ->
#      Manage -> Publishing) and add a new "Trusted Publisher" (GitHub Actions) with:
#         Owner:           shengyongniu
#         Repository:      agentgrade
#         Workflow name:   publish.yml
#         Environment:     pypi
#      (For a brand-new project with no release yet, use PyPI's
#       "pending publisher" form under your account's Publishing page with the
#       same four values.)
#
# After that, cutting a GitHub Release (or running this workflow manually) builds
# the sdist+wheel and uploads them to PyPI over OIDC — no username/password/token.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # REQUIRED for OIDC trusted publishing
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password: trusted publishing authenticates via OIDC.
